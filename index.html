<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coastal Runner - Electric OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        body { 
            margin: 0; 
            background: #050505; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            color: white; 
            text-align: center;
            touch-action: none; /* Prevents zooming/scrolling while playing */
        }
        
        .hide { display: none !important; }

        /* --- THE ELECTRIC UI OVERLAYS --- */
        .ui-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(-45deg, #0f0c29, #302b63, #00d2ff, #24243e);
            background-size: 400% 400%;
            animation: electricPulse 12s ease infinite;
            z-index: 1000; 
        }

        @keyframes electricPulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .panel { 
            background: rgba(10, 15, 30, 0.4); 
            backdrop-filter: blur(25px); 
            padding: 20px; 
            border-radius: 20px; 
            width: 85%;
            max-width: 350px; 
            display: flex; flex-direction: column; gap: 15px; 
            position: relative;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .panel h1 { color: #fff; margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px #00f2ff; }
        
        .input-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #00f2ff; }
        .input-group input { padding: 10px; background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid #333; color: #fff; font-family: 'Rajdhani', sans-serif; outline: none; }
        
        button { background: transparent; color: #00f2ff; border: 2px solid #00f2ff; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        
        .lb-list { list-style: none; padding: 0; max-height: 180px; overflow-y: auto; text-align: left; }
        .lb-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* --- RESPONSIVE GAME ENVIRONMENT --- */
        #gameArea { 
            width: 100%; 
            max-width: 500px; /* Limits width on large laptops */
            height: 100vh; 
            margin: auto; 
            position: relative; 
            overflow: hidden; 
            background: black; 
        }

        .scenery-city { position: absolute; left: 0; top: 0; width: 15%; height: 100%; background: #2c3e50; border-right: 4px solid #7f8c8d; z-index: 1; }
        .scenery-beach { position: absolute; right: 0; top: 0; width: 15%; height: 100%; background: linear-gradient(to right, #f1c40f, #e67e22); border-left: 4px solid #7f8c8d; z-index: 1; }
        .road { position: absolute; left: 15%; width: 70%; height: 100%; background: #34495e; z-index: 2; }
        .line { width: 6px; height: 80px; background: rgba(255, 255, 255, 0.4); position: absolute; left: 48%; z-index: 3; }

        .car { width: 45px; height: 85px; position: absolute; border-radius: 8px; z-index: 10; }
        .player { background: linear-gradient(180deg, #e74c3c, #c0392b); }
        .enemy { background: linear-gradient(180deg, #7f8c8d, #34495e); }

        /* --- RESPONSIVE HUD --- */
        .scoreBoard { position: absolute; top: 10px; left: 10px; font-size: 18px; background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 5px; border: 1px solid #00f2ff; z-index: 100; }
        
        .physical-dash {
            position: absolute; bottom: 10px; width: 100%; 
            display: flex; justify-content: space-around; align-items: flex-end; padding: 0 10px; box-sizing: border-box; z-index: 100;
        }

        .speedometer { width: 80px; height: 80px; background: rgba(10, 15, 30, 0.9); border-radius: 50%; border: 2px solid #ff007c; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .speed-text span { font-size: 24px; font-weight: bold; }
        .speed-text small { font-size: 10px; color: #00f2ff; display: block; }

        .steering-wheel {
            width: 90px; height: 90px; border-radius: 50%; border: 8px solid #111;
            position: relative; background: rgba(0, 242, 255, 0.1); transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="authOverlay" class="ui-container">
        <div id="loginPanel" class="panel">
            <h1>SYSTEM LOGIN</h1>
            <div id="loginError" class="error-text hide">ACCESS DENIED</div>
            <div class="input-group"><label>USERNAME</label><input type="text" id="logUser"></div>
            <div class="input-group"><label>PASSWORD</label><input type="password" id="logPass"></div>
            <button onclick="handleLogin()">INITIALIZE</button>
            <span class="toggle-link" onclick="toggleAuth('register')">NEW PILOT? REGISTER HERE</span>
        </div>
        <div id="registerPanel" class="panel hide">
            <h1>REGISTER</h1>
            <div class="input-group"><label>USERNAME</label><input type="text" id="regUser"></div>
            <div class="input-group"><label>PASSWORD</label><input type="password" id="regPass"></div>
            <button onclick="handleRegister()">CREATE LINK</button>
            <span class="toggle-link" onclick="toggleAuth('login')">RETURN TO LOGIN</span>
        </div>
    </div>

    <div id="menuOverlay" class="ui-container hide">
        <div class="panel">
            <h1>COASTAL RUNNER</h1>
            <p>WELCOME, <b id="displayUsername" style="color: #00f2ff;">PLAYER</b></p>
            <button onclick="startGame()">▶ LAUNCH ENGINE</button>
            <button onclick="showLeaderboard()">≡ LEADERBOARD</button>
        </div>
    </div>

    <div id="leaderboardOverlay" class="ui-container hide">
        <div class="panel">
            <h1>TOP PILOTS</h1>
            <ul class="lb-list" id="lbList"></ul>
            <button onclick="backToMenu()">RETURN</button>
        </div>
    </div>

    <div id="gameHUD" class="hide">
        <div class="scoreBoard">SCORE <span id="score">0</span></div>
        <div class="physical-dash">
            <div class="speedometer"><div class="speed-text"><span id="speedDisplay">0</span><small>KM/H</small></div></div>
            <div class="steering-wheel" id="steeringWheel"></div>
        </div>
    </div>
    
    <div id="gameArea" class="hide">
        <div class="scenery-city"></div>
        <div class="scenery-beach"></div>
        <div class="road" id="roadStrip"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000";
        let currentUser = null;
        const bgMusic = new Audio('song.mp3');
        bgMusic.loop = true;

        const els = {
            auth: document.getElementById('authOverlay'), login: document.getElementById('loginPanel'),
            register: document.getElementById('registerPanel'), menu: document.getElementById('menuOverlay'),
            lb: document.getElementById('leaderboardOverlay'), gameHUD: document.getElementById('gameHUD'),
            gameArea: document.getElementById('gameArea')
        };

        /* --- RESPONSIVE INPUT ENGINE --- */
        let keys = { ArrowLeft: false, ArrowRight: false };
        
        document.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Mobile Touch Logic: Split screen left/right
        document.addEventListener('touchstart', (e) => {
            let touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) keys.ArrowLeft = true;
            else keys.ArrowRight = true;
        });
        document.addEventListener('touchend', () => { keys.ArrowLeft = false; keys.ArrowRight = false; });

        /* --- DATA & AUTH LOGIC --- */
        function toggleAuth(type) {
            els.login.classList.toggle('hide', type === 'register');
            els.register.classList.toggle('hide', type === 'login');
        }

        async function handleRegister() {
            let username = document.getElementById('regUser').value;
            let password = document.getElementById('regPass').value;
            let pilots = JSON.parse(localStorage.getItem('pilots') || "[]");
            pilots.push({ username, password });
            localStorage.setItem('pilots', JSON.stringify(pilots));
            alert("Pilot registered locally."); toggleAuth('login');
        }

        async function handleLogin() {
            let username = document.getElementById('logUser').value;
            let password = document.getElementById('logPass').value;
            let pilots = JSON.parse(localStorage.getItem('pilots') || "[]");
            let user = pilots.find(p => p.username === username && p.password === password);
            if(user) {
                currentUser = user.username;
                els.auth.classList.add('hide'); els.menu.classList.remove('hide');
                document.getElementById('displayUsername').innerText = currentUser;
            } else { alert("Invalid credentials."); }
        }

        async function showLeaderboard() {
            els.menu.classList.add('hide'); els.lb.classList.remove('hide');
            let scores = JSON.parse(localStorage.getItem('highscores') || "[]");
            let html = scores.sort((a,b)=>b.score-a.score).slice(0,5).map((s,i)=>`<li class='lb-item'>#${i+1} ${s.username} <span>${s.score}</span></li>`).join('');
            document.getElementById('lbList').innerHTML = html || "No scores yet.";
        }

        function backToMenu() { els.lb.classList.add('hide'); els.menu.classList.remove('hide'); }

        /* --- GAME ENGINE --- */
        let player = { speed: 5, score: 0, start: false, x: 0 };
        let gameLoopReq;

        function gamePlay() {
            if(!player.start) return;
            let car = document.querySelector('.player');
            let road = document.querySelector('.road');
            let roadRect = road.getBoundingClientRect();

            // Movement Logic
            let zRotation = 0;
            let moveSpeed = player.speed * 0.8; 
            if(keys.ArrowLeft && player.x > 0) { player.x -= moveSpeed; zRotation = -25; }
            if(keys.ArrowRight && player.x < (roadRect.width - 45)) { player.x += moveSpeed; zRotation = 25; }
            
            car.style.left = player.x + 'px';
            document.getElementById('steeringWheel').style.transform = `rotate(${zRotation}deg)`;

            // Obstacle & Line Animation
            document.querySelectorAll('.line').forEach(item => { 
                item.y += player.speed; 
                if(item.y > window.innerHeight) item.y = -100;
                item.style.top = item.y + 'px';
            });

            document.querySelectorAll('.enemy').forEach(item => {
                if(isCollide(car, item)) { crash(); return; }
                item.y += player.speed * 0.6;
                if(item.y > window.innerHeight) {
                    item.y = -500;
                    item.style.left = Math.random() * (roadRect.width - 45) + 'px';
                }
                item.style.top = item.y + 'px';
            });

            player.score++;
            document.getElementById('score').innerText = player.score;
            document.getElementById('speedDisplay').innerText = Math.floor(player.speed * 20);
            if(player.score % 500 === 0) player.speed += 0.5;

            gameLoopReq = window.requestAnimationFrame(gamePlay);
        }

        function isCollide(a, b) {
            let aRect = a.getBoundingClientRect(); let bRect = b.getBoundingClientRect();
            return !((aRect.bottom < bRect.top) || (aRect.top > bRect.bottom) || (aRect.right < bRect.left) || (aRect.left > bRect.right));
        }

        function startGame() {
            bgMusic.play().catch(() => {});
            els.menu.classList.add('hide'); els.gameArea.classList.remove('hide'); els.gameHUD.classList.remove('hide');
            let road = document.querySelector('.road');
            road.innerHTML = "";
            player.start = true; player.score = 0; player.speed = 5; player.x = 50;

            for(let x=0; x<5; x++){ 
                let l = document.createElement('div'); l.className='line'; l.y=(x*200); l.style.top=l.y+'px'; road.appendChild(l); 
            }

            let pCar = document.createElement('div'); pCar.className='car player';
            road.appendChild(pCar);

            for(let x=0; x<2; x++){
                let e = document.createElement('div'); e.className='car enemy';
                e.y = (x + 1) * -400; e.style.left = '20px';
                road.appendChild(e);
            }
            gameLoopReq = window.requestAnimationFrame(gamePlay);
        }

        function crash() {
            player.start = false; window.cancelAnimationFrame(gameLoopReq);
            let highscores = JSON.parse(localStorage.getItem('highscores') || "[]");
            highscores.push({ username: currentUser, score: player.score });
            localStorage.setItem('highscores', JSON.stringify(highscores));
            alert("CRASHED! Score: " + player.score);
            location.reload();
        }
    </script>
</body>
</html>
